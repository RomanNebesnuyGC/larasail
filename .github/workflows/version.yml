name: Version

on:
  push:
    branches: [master]

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-24.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -q '\[minor\]'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(cat .larasail/VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: echo "${{ steps.version.outputs.new }}" > .larasail/VERSION

      - name: Generate changelog entry
        run: |
          NEW="${{ steps.version.outputs.new }}"
          PREV="${{ steps.version.outputs.current }}"
          DATE=$(date +%Y-%m-%d)

          PREV_TAG=$(git tag --list "v${PREV}" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v '\[skip ci\]')
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- (no changes recorded)"
          fi

          {
            head -n 1 CHANGELOG.md
            echo ""
            echo "## [${NEW}] â€” ${DATE}"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .larasail/VERSION CHANGELOG.md
          git commit -m "chore: bump version ${{ steps.version.outputs.current }} â†’ ${{ steps.version.outputs.new }} [skip ci]"
          git tag "v${{ steps.version.outputs.new }}"
          git push
          git push origin "v${{ steps.version.outputs.new }}"
